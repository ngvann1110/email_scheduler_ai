[pytest]
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (API endpoints with mocked deps)
    frontend: Frontend/UI tests (Playwright browser tests)
    e2e: End-to-end tests (full pipeline with mocked APIs)
    slow: Slow tests (e2e, frontend)
    async: Async tests (pytest-asyncio)

# Asyncio mode
asyncio_mode = auto

# Verbose output
addopts = -v --tb=short

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
